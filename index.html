<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City of Echoes Adventure</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main id="game-container" role="main" aria-labelledby="game-title">
        <h1 id="game-title">City of Echoes Adventure</h1>

        <section id="story-section" aria-live="polite">
            <p id="question">Your adventure begins now...</p>
        </section>

        <section aria-label="Available choices">
            <ul id="answers" role="list">
                <!-- Answer buttons will be injected here by JavaScript -->
            </ul>
        </section>

        <button id="next-btn" type="button">
            Next
        </button>
    </main>

    <script src="script.js"></script>
</body>
</html>
